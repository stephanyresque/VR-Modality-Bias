run:
  seed_global: 10
  name: "baseline_llava_sparc"
  # Post-Block-4 layout: <output_root>/<area>/<model.key>/<length>/<run-name>_<ts>/
  # See results/README.md for the schema.
  output_root: "results"
  area: "diagnostico"  # "diagnostico" (base model) or "avaliacao" (SPARC vs baseline)

dataset:
  name: "mscoco_baseline"
  manifest_path: "data/processed/mscoco_baseline/manifest.jsonl"
  images_dir: "data/processed/mscoco_baseline/images"
  n_images: 50

model:
  # Post-Block-2: only LLaVA-1.5-7B is registered. The per-length
  # configs (run_qwen7b_*.yaml, run_smolvlm22_*.yaml) were retired; new
  # length-specific LLaVA configs land in the diagnostic / eval block.
  key: "llava-1.5-7b"
  model_id: "llava-hf/llava-1.5-7b-hf"
  dtype: "float16"

task:
  name: "caption_long"
  prompt_key: "caption_long"

generation:
  max_new_tokens: 64
  do_sample: true
  temperature: 0.3
  top_p: 0.9
  repetition_penalty: 1.0

teacher_forcing:
  output_hidden_states: true
  use_cache: false

metrics:
  logits_top_k: 50
  deep_block_rule: "last_third"

residual:
  t0: 5

io:
  hidden_states_format: "h5"
  hidden_states_dtype: "float16"
  compression: "gzip"
  compression_level: 4
