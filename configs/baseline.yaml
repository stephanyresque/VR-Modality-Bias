run:
  seed_global: 10 
  name: "baseline_qwen_sparc"
  output_root: "results/runs"

dataset:
  name: "mscoco_baseline"
  manifest_path: "data/processed/mscoco_baseline/manifest.jsonl"
  images_dir: "data/processed/mscoco_baseline/images"
  n_images: 50 

model:
  # key: "smolvlm-256m"
  key: "qwen2.5-vl-7b"
  model_id: "Qwen/Qwen2.5-VL-7B-Instruct"
  # model_id: "HuggingFaceTB/SmolVLM-256M-Instruct"
  dtype: "bfloat16"

task:
  name: "caption_long"
  prompt_key: "caption_long"

generation:
  max_new_tokens: 4096 
  do_sample: true
  temperature: 0.8
  top_p: 0.9
  repetition_penalty: 1.0

teacher_forcing:
  output_hidden_states: true
  use_cache: false

metrics:
  logits_top_k: 50
  deep_block_rule: "last_third"

residual:
  t0: 5

io:
  hidden_states_format: "h5"
  hidden_states_dtype: "float16"
  compression: "gzip"
  compression_level: 4
